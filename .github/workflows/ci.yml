name: Android CI (Akshar)

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests (all modules)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Run lint on all app modules
        run: ./gradlew lintDebug --no-daemon

      - name: Assemble debug APKs (all apps)
        run: |
          ./gradlew :english:assembleDebug \
                     :hindi:assembleDebug \
                     :marathi:assembleDebug \
                     --no-daemon

      - name: Upload debug APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akshar-debug-apks
          path: |
            english/build/outputs/apk/debug/*.apk
            hindi/build/outputs/apk/debug/*.apk
            marathi/build/outputs/apk/debug/*.apk
