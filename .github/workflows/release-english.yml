name: Release — english

# Triggers: push a tag like english-v1.2.3 OR run manually from Actions UI
on:
  push:
    tags:
      - 'english-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.2.3) - optional (used for manual run)'
        required: false
      track:
        description: 'Play Store track (internal/alpha/beta/production)'
        required: false
        default: internal

env:
  MODULE: english
  PACKAGE: ${{ secrets.ENGLISH_APPLICATION_ID }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode ENGLISH keystore and google-services.json (robust + debug)
        env:
          ENGLISH_KEYSTORE_BASE64: ${{ secrets.ENGLISH_KEYSTORE_BASE64 }}
          ENGLISH_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ENGLISH_GOOGLE_SERVICES_JSON_B64 }}
          ENGLISH_GOOGLE_SERVICES_JSON_RAW: ${{ secrets.ENGLISH_GOOGLE_SERVICES_JSON_RAW }}
        run: |
          set -euo pipefail

          echo ">>> Checking secrets presence..."
          if [ -z "${ENGLISH_GOOGLE_SERVICES_JSON_B64:-}" ] && [ -z "${ENGLISH_GOOGLE_SERVICES_JSON_RAW:-}" ]; then
            echo "::warning::No google-services.json secret found (ENGLISH_GOOGLE_SERVICES_JSON_B64 or ENGLISH_GOOGLE_SERVICES_JSON_RAW). If your app requires Firebase in release, add one of these secrets."
          else
            echo "google-services secret present (not shown)."
          fi

          # ensure directories exist
          mkdir -p english/src/release english/src/debug english/src

          # prefer base64 secret (decoded) else raw JSON secret
          if [ -n "${ENGLISH_GOOGLE_SERVICES_JSON_B64:-}" ]; then
            echo "Decoding ENGLISH_GOOGLE_SERVICES_JSON_B64 into release/debug/root..."
            echo "$ENGLISH_GOOGLE_SERVICES_JSON_B64" | base64 -d > english/src/release/google-services.json
            echo "$ENGLISH_GOOGLE_SERVICES_JSON_B64" | base64 -d > english/src/debug/google-services.json
            echo "$ENGLISH_GOOGLE_SERVICES_JSON_B64" | base64 -d > english/src/google-services.json
          elif [ -n "${ENGLISH_GOOGLE_SERVICES_JSON_RAW:-}" ]; then
            echo "Writing ENGLISH_GOOGLE_SERVICES_JSON_RAW into release/debug/root..."
            printf '%s\n' "$ENGLISH_GOOGLE_SERVICES_JSON_RAW" > english/src/release/google-services.json
            printf '%s\n' "$ENGLISH_GOOGLE_SERVICES_JSON_RAW" > english/src/debug/google-services.json
            printf '%s\n' "$ENGLISH_GOOGLE_SERVICES_JSON_RAW" > english/src/google-services.json
          fi

          # verify the files (show a tiny preview, not private key)
          for f in english/src/release/google-services.json english/src/debug/google-services.json english/src/google-services.json; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              echo "WROTE $f (size=$(wc -c <"$f") bytes). First 120 chars:"
              head -c 120 "$f" | sed -n '1,4p' || true
            else
              echo "NOTE: $f does not exist or is empty (this might be expected if you don't use Firebase in release)."
            fi
          done

          # decode keystore if provided
          if [ -n "${ENGLISH_KEYSTORE_BASE64:-}" ]; then
            echo "Decoding ENGLISH_KEYSTORE_BASE64 to english-upload-keystore.jks"
            echo "$ENGLISH_KEYSTORE_BASE64" | base64 -d > english-upload-keystore.jks
            ls -lh english-upload-keystore.jks || true
          else
            echo "No ENGLISH_KEYSTORE_BASE64 secret provided — skipping keystore decode."
          fi

      - name: Write signing-config.properties (separate file, avoids gradle.properties append issues)
        env:
          ENGLISH_KEYSTORE_PASSWORD: ${{ secrets.ENGLISH_KEYSTORE_PASSWORD }}
          ENGLISH_KEY_ALIAS: ${{ secrets.ENGLISH_KEY_ALIAS }}
          ENGLISH_KEY_PASSWORD: ${{ secrets.ENGLISH_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ENGLISH_KEYSTORE_PASSWORD:-}" ]; then
            echo "Writing signing-config.properties (root)"
            printf '%s\n' "KEYSTORE_PASSWORD=${ENGLISH_KEYSTORE_PASSWORD}" > signing-config.properties
            printf '%s\n' "KEY_ALIAS=${ENGLISH_KEY_ALIAS}" >> signing-config.properties
            printf '%s\n' "KEY_PASSWORD=${ENGLISH_KEY_PASSWORD}" >> signing-config.properties
            echo "signing-config.properties written (size: $(wc -c < signing-config.properties) bytes)"
          else
            echo "No signing secrets provided; ensure Play signing will handle signing or provide keystore secrets."
            rm -f signing-config.properties || true
          fi

      - name: Safely write VERSION_NAME & VERSION_CODE into gradle.properties (guarantee newline)
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF##*/}
          VERSION_NAME=""
          if [[ "$TAG" =~ ^english-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION_NAME=${BASH_REMATCH[1]}
            echo "Detected tag version: $VERSION_NAME"
          fi
          if [ -z "$VERSION_NAME" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version }}"
            echo "Using manual input version: $VERSION_NAME"
          fi

          if [ -n "$VERSION_NAME" ]; then
            VERSION_CODE=$(date -u +"%Y%m%d%H%M")
            touch "$GITHUB_WORKSPACE/gradle.properties"
            # ensure separation newline
            printf '\n' >> "$GITHUB_WORKSPACE/gradle.properties"
            printf '%s\n' "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_WORKSPACE/gradle.properties"
            printf '%s\n' "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_WORKSPACE/gradle.properties"
            echo "Wrote VERSION_NAME=${VERSION_NAME}, VERSION_CODE=${VERSION_CODE} to gradle.properties"
          else
            echo "No VERSION_NAME provided; build will use project defaults."
          fi

      - name: Pre-build listing (sanity)
        run: |
          set -euo pipefail
          echo "Checking google-services.json locations:"
          ls -la english/src/release || true
          ls -la english/src || true
          echo "Root signing-config.properties exists:"
          [ -f signing-config.properties ] && echo "signing-config.properties size: $(wc -c < signing-config.properties)" || echo "no signing-config.properties"

      - name: Build release AAB for english
        run: |
          set -euo pipefail
          echo "Building :${{ env.MODULE }}:bundleRelease ..."
          ./gradlew :${{ env.MODULE }}:clean :${{ env.MODULE }}:bundleRelease --no-daemon

      - name: Upload built AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: english-release-aab
          path: ${{ env.MODULE }}/build/outputs/bundle/release/*.aab

      - name: Write Play service account JSON to file (for uploader)
        env:
          ENGLISH_PLAY_STORE_JSON: ${{ secrets.ENGLISH_PLAY_STORE_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${ENGLISH_PLAY_STORE_JSON:-}" ]; then
            echo "::error::ENGLISH_PLAY_STORE_JSON secret is empty or missing"
            exit 1
          fi
          printf '%s\n' "$ENGLISH_PLAY_STORE_JSON" > ./service-account.json
          echo "WROTE service-account.json (size: $(wc -c < ./service-account.json) bytes)"
          # show non-sensitive preview
          head -n 2 ./service-account.json || true

      - name: Publish to Google Play (use on-disk service account file)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: './service-account.json'
          packageName: ${{ env.PACKAGE }}
          releaseFiles: ${{ env.MODULE }}/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track != '' && github.event.inputs.track || 'internal' }}

      - name: Cleanup service-account.json
        if: always()
        run: |
          rm -f ./service-account.json || true

      - name: Final info
        run: |
          echo "Release workflow finished. Check artifact english-release-aab and Play Console."
