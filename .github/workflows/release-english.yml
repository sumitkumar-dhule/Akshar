name: Release — english

on:
  push:
    tags:
      - 'english-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.2.3) - optional (used for manual run)'
        required: false
      track:
        description: 'Play Store track (internal/alpha/beta/production)'
        required: false
        default: internal

env:
  MODULE: english
  PACKAGE: ${{ secrets.ENGLISH_APPLICATION_ID }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode ENGLISH keystore and google-services.json (robust)
        env:
          ENGLISH_KEYSTORE_BASE64: ${{ secrets.ENGLISH_KEYSTORE_BASE64 }}
          ENGLISH_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ENGLISH_GOOGLE_SERVICES_JSON_B64 }}
          ENGLISH_GOOGLE_SERVICES_JSON_RAW: ${{ secrets.ENGLISH_GOOGLE_SERVICES_JSON_RAW }}
        run: |
          set -euo pipefail

          # --- Decode keystore if present ---
          if [ -n "${ENGLISH_KEYSTORE_BASE64:-}" ]; then
            echo "Decoding ENGLISH keystore..."
            echo "$ENGLISH_KEYSTORE_BASE64" | base64 -d > "${{ env.MODULE }}-upload-keystore.jks"
            ls -lh "${{ env.MODULE }}-upload-keystore.jks"
          else
            echo "No ENGLISH_KEYSTORE_BASE64 secret found — skipping keystore decode."
          fi

          # --- Ensure module src dirs ---
          mkdir -p "${{ env.MODULE }}/src/release"
          mkdir -p "${{ env.MODULE }}/src/debug"
          mkdir -p "${{ env.MODULE }}/src"

          WRITE_PATHS=(
            "${{ env.MODULE }}/src/release/google-services.json"
            "${{ env.MODULE }}/src/debug/google-services.json"
            "${{ env.MODULE }}/src/google-services.json"
          )

          check_written() {
            local p="$1"
            if [ -f "$p" ]; then
              echo "WROTE: $p (size: $(wc -c < "$p") bytes)"
              echo "First 120 bytes (sanity):"
              head -c 120 "$p" | sed -n '1,4p' || true
            else
              echo "MISSING: $p"
            fi
          }

          # --- Write google-services.json (prefer base64 secret, else raw JSON) ---
          if [ -n "${ENGLISH_GOOGLE_SERVICES_JSON_B64:-}" ]; then
            echo "Decoding ENGLISH_GOOGLE_SERVICES_JSON_B64 into module paths..."
            for p in "${WRITE_PATHS[@]}"; do
              echo "$ENGLISH_GOOGLE_SERVICES_JSON_B64" | base64 -d > "$p" || ( echo "ERROR decoding base64 to $p" && exit 1 )
            done
            for p in "${WRITE_PATHS[@]}"; do check_written "$p"; done

          elif [ -n "${ENGLISH_GOOGLE_SERVICES_JSON_RAW:-}" ]; then
            echo "Writing ENGLISH_GOOGLE_SERVICES_JSON_RAW into module paths..."
            for p in "${WRITE_PATHS[@]}"; do
              printf '%s\n' "$ENGLISH_GOOGLE_SERVICES_JSON_RAW" > "$p"
            done
            for p in "${WRITE_PATHS[@]}"; do check_written "$p"; done

          else
            echo "No ENGLISH_GOOGLE_SERVICES_JSON_B64 or ENGLISH_GOOGLE_SERVICES_JSON_RAW secret found — google-services.json will be missing."
          fi

      - name: Write signing-config.properties (separate file, avoids gradle.properties append issues)
        env:
          ENGLISH_KEYSTORE_PASSWORD: ${{ secrets.ENGLISH_KEYSTORE_PASSWORD }}
          ENGLISH_KEY_ALIAS: ${{ secrets.ENGLISH_KEY_ALIAS }}
          ENGLISH_KEY_PASSWORD: ${{ secrets.ENGLISH_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # create empty file or overwrite with secrets if present
          if [ -n "${ENGLISH_KEYSTORE_PASSWORD:-}" ]; then
            echo "Writing signing-config.properties (root) — NOT gradle.properties"
            printf '%s\n' "KEYSTORE_PASSWORD=${ENGLISH_KEYSTORE_PASSWORD}" > signing-config.properties
            printf '%s\n' "KEY_ALIAS=${ENGLISH_KEY_ALIAS}" >> signing-config.properties
            printf '%s\n' "KEY_PASSWORD=${ENGLISH_KEY_PASSWORD}" >> signing-config.properties
            echo "signing-config.properties written (size: $(wc -c < signing-config.properties) bytes)"
          else
            echo "No signing secrets provided; skipping signing-config.properties write."
            # ensure file does not accidentally exist with old content
            rm -f signing-config.properties || true
          fi

      - name: Safely write VERSION_NAME & VERSION_CODE into gradle.properties (guarantee newline)
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF##*/}
          VERSION_NAME=""
          if [[ "$TAG" =~ ^english-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION_NAME=${BASH_REMATCH[1]}
            echo "Detected tag version: $VERSION_NAME"
          fi
          if [ -z "$VERSION_NAME" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version }}"
            echo "Using manual input version: $VERSION_NAME"
          fi

          if [ -n "$VERSION_NAME" ]; then
            VERSION_CODE=$(date -u +"%Y%m%d%H%M")
            # ensure gradle.properties exists and ends with a newline
            touch "$GITHUB_WORKSPACE/gradle.properties"
            # append a newline to separate safely
            printf '\n' >> "$GITHUB_WORKSPACE/gradle.properties"
            # now append version properties with newline
            printf '%s\n' "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_WORKSPACE/gradle.properties"
            printf '%s\n' "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_WORKSPACE/gradle.properties"
            echo "Wrote VERSION_NAME=${VERSION_NAME}, VERSION_CODE=${VERSION_CODE} to gradle.properties"
          else
            echo "No VERSION_NAME provided; build will use project defaults."
          fi

      - name: Pre-build listing (sanity)
        run: |
          set -euo pipefail
          echo "Checking google-services.json locations:"
          ls -la "${{ env.MODULE }}/src/release" || true
          ls -la "${{ env.MODULE }}/src" || true
          echo "Root signing-config.properties exists:"
          [ -f signing-config.properties ] && echo "signing-config.properties size: $(wc -c < signing-config.properties)" || echo "no signing-config.properties"

      - name: Build release AAB for english
        run: |
          set -euo pipefail
          echo "Building :${{ env.MODULE }}:bundleRelease ..."
          ./gradlew :${{ env.MODULE }}:clean :${{ env.MODULE }}:bundleRelease --no-daemon

      - name: Upload built AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: english-release-aab
          path: ${{ env.MODULE }}/build/outputs/bundle/release/*.aab

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: '${{ secrets.ENGLISH_PLAY_STORE_JSON }}'
          packageName: ${{ env.PACKAGE }}
          releaseFiles: ${{ env.MODULE }}/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track != '' && github.event.inputs.track || 'internal' }}

      - name: Final info
        run: |
          echo "Release workflow finished. Check artifact english-release-aab and Play Console."
